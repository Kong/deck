_format_version: "3.0"
plugins:
- config:
    anonymous: nil
    hide_credentials: true
    realm: service
  enabled: true
  name: basic-auth
  protocols:
  - http
  - https
services:
- connect_timeout: 60000
  enabled: true
  host: httpbin.org
  name: mock1
  path: /anything
  port: 80
  protocol: http
  read_timeout: 60000
  retries: 5
  write_timeout: 60000
