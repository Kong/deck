_format_version: "3.0"
_konnect:
  control_plane_name: default
_workspace: test-workspace
certificates:
- cert: '{vault://my-env-vault/cert}'
  id: 13c562a1-191c-4464-9b18-e5222b46035b
  key: '{vault://my-env-vault/key}'
  snis:
  - name: localhost
consumers:
- custom_id: test_consumer_3x_custom_test
  username: test_consumer_3x
routes:
- https_redirect_status_code: 302
  name: route-multi-entity-1
  path_handling: v0
  paths:
  - /route-multi-entity-1-updated
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
- https_redirect_status_code: 301
  name: route-multi-entity-2
  path_handling: v0
  paths:
  - /route-multi-entity-2
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
- https_redirect_status_code: 301
  name: route-multi-entity-3
  path_handling: v0
  paths:
  - /route-multi-entity-3
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
services:
- connect_timeout: 60000
  enabled: true
  host: httpbin.org
  name: mock-multi-1
  path: /anything
  port: 80
  protocol: http
  read_timeout: 60000
  retries: 5
  write_timeout: 60000
upstreams:
- algorithm: round-robin
  hash_fallback: none
  hash_on: none
  hash_on_cookie_path: /
  healthchecks:
    active:
      concurrency: 10
      healthy:
        http_statuses:
        - 200
        - 302
        interval: 0
        successes: 0
      http_path: /
      https_verify_certificate: true
      timeout: 1
      type: http
      unhealthy:
        http_failures: 0
        http_statuses:
        - 429
        - 404
        - 500
        - 501
        - 502
        - 503
        - 504
        - 505
        interval: 0
        tcp_failures: 0
        timeouts: 0
    passive:
      healthy:
        http_statuses:
        - 200
        - 201
        - 202
        - 203
        - 204
        - 205
        - 206
        - 207
        - 208
        - 226
        - 300
        - 301
        - 302
        - 303
        - 304
        - 305
        - 306
        - 307
        - 308
        successes: 0
      type: http
      unhealthy:
        http_failures: 0
        http_statuses:
        - 429
        - 500
        - 503
        tcp_failures: 0
        timeouts: 0
    threshold: 0
  name: upstream1
  slots: 10000
  sticky_sessions_cookie_path: /
  targets:
  - failover: false
    target: 198.51.100.11:80
    weight: 100
  use_srv_name: false
vaults:
- config:
    base64_decode: false
    prefix: MY_SECRET_
  description: ENV vault for secrets
  name: env
  prefix: my-env-vault
