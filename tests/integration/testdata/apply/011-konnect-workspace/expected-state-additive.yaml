_format_version: "3.0"
_konnect:
  control_plane_name: default
routes:
- https_redirect_status_code: 301
  name: route-existing
  path_handling: v0
  paths:
  - /route-existing
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
- https_redirect_status_code: 301
  name: route-new
  path_handling: v0
  paths:
  - /route-new
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
