_format_version: "3.0"
_info:
  select_tags:
    - "managed-by: deck-ai"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      response_streaming: allow
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2
          model:
            model_alias: '@openai/gpt-5.2'
            name: gpt-5.2
            options:
              max_tokens: 1024
              temperature: 1
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
    model: gpt-5-2
ai-models:
  - name: gpt-5-2
    alias: '@openai/gpt-5.2'