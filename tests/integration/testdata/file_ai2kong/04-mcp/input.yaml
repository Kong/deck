mcp_servers:
  - type: conversion-listener
    display_name: Secure Flights MCP
    name: secure-flights-mcp
    enabled: true
    config:
      route:
        paths:
          - /mcp/secure-flights
      auth:
        acl_attribute_type: oauth_access_token
        access_token_claim_field: .user.email
        default_tool_acls:
          allow:
            - premium
    tools:
      - name: searchFlights
        description: Search available flights
        method: GET
        path: /flights
        scheme: https
        host: flights.internal
  - type: passthrough-listener
    name: vendor-proxy-mcp
    upstream_url: https://vendor.example.com/mcp
    config:
      route:
        paths:
          - /mcp/vendor-proxy
      proxy:
        https_proxy:
          host: proxy.internal
          port: 8080
    tools:
      - name: vendorTool
        description: A vendor tool
  - type: upstream-server
    name: upstream-mcp
    upstream_url: https://upstream.example.com/mcp
    config:
      route:
        paths:
          - /mcp/upstream
      tools_cache_ttl_seconds: 300
      server:
        preserve_upstream_tool_names: true
    tools:
      - name: upstreamTool
        description: An upstream tool
        input_schema:
          type: object
        output_schema:
          type: object
