mcp_servers:
  - type: conversion-listener
    display_name: Secure Flights MCP OAUTH
    name: secure-flights-mcp-oauth
    enabled: true
    config:
      route:
        paths:
          - /mcp/secure-flights
      access:
        acl_attribute_type: oauth_access_token
        access_token_claim_field: .user.email
        acls: {allow: [gold], deny: [platinum]}
        default_tool_acls:
          allow:
            - premium
    tools:
      - name: searchFlights
        description: Search available flights
        method: GET
        path: /flights
        scheme: https
        host: flights.internal
  - type: conversion-listener
    display_name: Secure Flights MCP Consumer
    name: secure-flights-mcp-consumer
    enabled: true
    config:
      route:
        paths:
          - /mcp/secure-flights
      access:
        acl_attribute_type: consumer
        acls: {allow: [agents], deny: []}
        default_tool_acls:
          allow:
            - premium
    tools:
      - name: searchFlights
        description: Search available flights
        method: GET
        path: /flights
        scheme: https
        host: flights.internal
  # passthrough-listener carrying a proxy block (-> proxy_config).
  - type: passthrough-listener
    name: vendor-proxy-mcp
    upstream_url: https://vendor.example.com/mcp
    config:
      route:
        paths:
          - /mcp/vendor-proxy
      proxy:
        https_proxy:
          host: proxy.internal
          port: 8080
    tools:
      - name: vendorTool
        description: A vendor tool
  - type: upstream-server
    name: upstream-mcp
    upstream_url: https://upstream.example.com/mcp
    config:
      route:
        paths:
          - /mcp/upstream
      tools_cache_ttl_seconds: 300
      server:
        preserve_upstream_tool_names: true
    tools:
      - name: upstreamTool
        description: An upstream tool
        input_schema:
          type: object
        output_schema:
          type: object
