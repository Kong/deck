_format_version: "3.0"
_info:
  select_tags:
    - 'managed-by:deck-ai'
services:
  - name: booking-agent
    url: https://booking-agent.internal:8443/a2a
    routes:
      - name: booking-route
        paths:
          - /agents/booking
        methods:
          - POST
        plugins:
          - name: ai-a2a-proxy
            config:
              logging:
                log_payloads: false
                log_statistics: true
                max_payload_size: 524288
              max_request_body_size: 1048576
  - name: weather-agent
    url: https://weather.internal/api
    routes:
      - name: weather-route
        paths:
          - /agents/weather
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
