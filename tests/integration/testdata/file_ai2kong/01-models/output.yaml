_format_version: "3.0"
_info:
  select_tags:
  - managed_by:deck-ai
ai_models:
- alias: '@openai/gpt-4o'
  name: gpt-4o
- alias: '@openai/gpt-5.4'
  name: gpt-5.4
plugins:
- config:
    body_path: model
    max_request_body_size: 8388608
    source: body
  name: ai-model-selector
  route: openai-chat
- config:
    balancer:
      algorithm: round-robin
      slots: 10000
    genai_category: text/generation
    llm_format: openai
    targets:
    - auth:
        header_name: Authorization
        header_value: '{vault://env/openai-key}'
      description: gpt-4o
      logging:
        log_payloads: false
        log_statistics: true
      model:
        model_alias: '@openai/gpt-4o'
        name: gpt-4o
        options:
          temperature: 0.7
        provider: openai
      route_type: llm/v1/chat
      weight: 70
    - auth:
        param_location: query
        param_name: api-key
        param_value: '{vault://env/azure-key}'
      description: gpt-4o-azure
      logging:
        log_payloads: false
        log_statistics: true
      model:
        model_alias: '@openai/gpt-4o'
        name: gpt-4o-azure
        options:
          azure_api_version: "2024-02-01"
          azure_deployment_id: gpt4o-dep
          azure_instance: kong-az-east
        provider: azure
      route_type: llm/v1/chat
      weight: 30
  model: gpt-4o
  name: ai-proxy-advanced
  route: openai-chat
- config:
    balancer:
      algorithm: round-robin
      slots: 10000
    genai_category: text/generation
    llm_format: openai
    targets:
    - auth:
        header_name: Authorization
        header_value: '{vault://env/openai-key}'
      description: gpt-5.4
      logging:
        log_payloads: false
        log_statistics: true
      model:
        model_alias: '@openai/gpt-5.4'
        name: gpt-5.4
        options:
          temperature: 0.7
        provider: openai
      route_type: llm/v1/chat
      weight: 70
    - auth:
        param_location: query
        param_name: api-key
        param_value: '{vault://env/azure-key}'
      description: gpt-5.4-azure
      logging:
        log_payloads: false
        log_statistics: true
      model:
        model_alias: '@openai/gpt-5.4'
        name: gpt-5.4-azure
        options:
          azure_api_version: "2024-02-01"
          azure_deployment_id: gpt5.4-dep
          azure_instance: kong-az-east
        provider: azure
      route_type: llm/v1/chat
      weight: 30
  model: gpt-5.4
  name: ai-proxy-advanced
  route: openai-chat
services:
- name: ai-gateway
  routes:
  - methods:
    - POST
    name: openai-chat
    paths:
    - /ai/chat/completions
    strip_path: false
  url: http://ai-gateway.upstream.local