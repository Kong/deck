_format_version: "3.0"
_info:
  select_tags:
    - 'managed-by: deck-ai'
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
        slots: 10000
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://env/openai-key}'
          description: gpt-4o
          model:
            model_alias: '@openai/gpt-4o'
            name: gpt-4o
            options:
              temperature: 0.7
            provider: openai
          route_type: llm/v1/chat
          weight: 70
        - auth:
            param_location: query
            param_name: api-key
            param_value: '{vault://env/azure-key}'
          description: gpt-4o-azure
          model:
            model_alias: '@openai/gpt-4o'
            name: gpt-4o-azure
            options:
              azure_api_version: "2024-02-01"
              azure_deployment_id: gpt4o-dep
              azure_instance: kong-az-east
            provider: azure
          route_type: llm/v1/chat
          weight: 30
    route: openai-chat
    model:
      name: gpt-4o
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
        slots: 10000
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://env/openai-key}'
          description: gpt-5.4
          model:
            model_alias: '@openai/gpt-5.4'
            name: gpt-5.4
            options:
              temperature: 0.7
            provider: openai
          route_type: llm/v1/chat
          weight: 70
        - auth:
            param_location: query
            param_name: api-key
            param_value: '{vault://env/azure-key}'
          description: gpt-5.4-azure
          model:
            model_alias: '@openai/gpt-5.4'
            name: gpt-5.4-azure
            options:
              azure_api_version: "2024-02-01"
              azure_deployment_id: gpt5.4-dep
              azure_instance: kong-az-east
            provider: azure
          route_type: llm/v1/chat
          weight: 30
    route: openai-chat
    model:
      name: gpt-5.4
ai_models:
  - name: gpt-4o
    alias: '@openai/gpt-4o'
  - name: gpt-5.4
    alias: '@openai/gpt-5.4'
