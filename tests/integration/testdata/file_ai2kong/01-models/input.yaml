models:
  - type: model
    display_name: gpt-4o
    name: gpt-4o
    capabilities: [generate]
    formats:
      - type: openai
    targets:
      - name: gpt-4o
        weight: 70
        provider: openai-main
        config:
          type: openai
          temperature: 0.7
      - name: gpt-4o-azure
        weight: 30
        provider: azure-east
        config:
          type: azure
          deployment_id: gpt4o-dep
          api_version: "2024-02-01"
    policies: []
    acls: {allow: [], deny: []}
    config:
      route:
        paths: [/ai]
      model:
        alias: "@openai/gpt-4o"
      balancer:
        algorithm: round-robin
        slots: 10000
  - type: model
    display_name: gpt-5.4
    name: gpt-5.4
    capabilities: [generate]
    formats:
      - type: openai
    targets:
      - name: gpt-5.4
        weight: 70
        provider: openai-main
        config:
          type: openai
          temperature: 0.7
      - name: gpt-5.4-azure
        weight: 30
        provider: azure-east
        config:
          type: azure
          deployment_id: gpt5.4-dep
          api_version: "2024-02-01"
    policies: []
    acls: {allow: [], deny: []}
    config:
      route:
        paths: [/ai]
      model:
        alias: "@openai/gpt-5.4"
      balancer:
        algorithm: round-robin
        slots: 10000
model_providers:
  - type: openai
    display_name: OpenAI Main
    name: openai-main
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: "{vault://env/openai-key}"
  - type: azure
    display_name: Azure East
    name: azure-east
    config:
      instance: kong-az-east
      auth:
        type: basic
        params:
          - name: api-key
            value: "{vault://env/azure-key}"
            location: query
