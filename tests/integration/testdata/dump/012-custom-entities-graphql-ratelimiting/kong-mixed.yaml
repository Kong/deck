_format_version: "3.0"
plugins:
- config:
    graphql_server_path: /graphql
  enabled: true
  id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f8a
  name: degraphql
  protocols:
  - grpc
  - grpcs
  - http
  - https
services:
- connect_timeout: 60000
  host: mockbin.org
  id: 5c3a1e8f-9b2d-4f7a-a3c6-8e1d4b6f9a2c
  name: svc1
  port: 80
  protocol: http
  read_timeout: 60000
  retries: 5
  write_timeout: 60000
custom_entities:
  - type: degraphql_routes
    id: f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f8a9b0c
    fields:
      uri: "/foo"
      query: "query{ foo { bar } }"
      service:
        id: 5c3a1e8f-9b2d-4f7a-a3c6-8e1d4b6f9a2c
  - type: graphql_ratelimiting_cost_decorations
    id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
    fields:
      service:
        id: 5c3a1e8f-9b2d-4f7a-a3c6-8e1d4b6f9a2c
      type_path: "Query.users"
      add_constant: 1.0
      add_arguments:
        - "limit"
      mul_arguments:
        - "first"

