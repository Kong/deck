_format_version: "3.0"
services:
- connect_timeout: 60000
  enabled: true
  host: mockbin.org
  name: mockbin
  routes:
  - https_redirect_status_code: 301
    name: r2
    paths:
    - /r2
    plugins:
    - config:
        access:
        - kong.log.err("bar")       kong.response.exit(418)
      enabled: true
      name: post-function
  - https_redirect_status_code: 301
    name: r3
    paths:
    - /r3
    plugins:
    - config:
        access:
        - kong.log.err("bar")       kong.response.exit(418)
      enabled: true
      name: post-function
  - https_redirect_status_code: 301
    name: r4
    paths:
    - /r4
    plugins:
    - config:
        access:
        - kong.log.err("bar")       kong.response.exit(418)
      enabled: true
      name: post-function
