_format_version: "3.0"
_workspace: test-workspace
_konnect:
  control_plane_name: default
services:
  - connect_timeout: 60000
    enabled: true
    host: httpbin.org
    name: mock-multi-1
    path: /anything
    port: 80
    protocol: http
    read_timeout: 60000
    retries: 5
    write_timeout: 60000
routes:
  - name: route-multi-entity-1
    paths:
      - /route-multi-entity-1
    https_redirect_status_code: 301
  - name: route-multi-entity-2
    paths:
      - /route-multi-entity-2
    https_redirect_status_code: 301
upstreams:
  - name: upstream1
    algorithm: round-robin
    sticky_sessions_cookie_path: /
    targets:
      - target: 198.51.100.11:80
vaults:
  - config:
      base64_decode: false
      prefix: MY_SECRET_
    description: ENV vault for secrets
    name: env
    prefix: my-workspace-vault
certificates:
  - id: 13c562a1-191c-4464-9b18-e5222b46035b
    cert: "{vault://my-workspace-vault/cert}"
    key: "{vault://my-workspace-vault/key}"
    snis:
      - name: localhost
consumers:
  - custom_id: test_consumer_3x_custom_test
    username: test_consumer_3x
    acls:
      - group: silver
        tags:
          - test-acl
    basicauth_credentials:
      - username: basic_user
        password: basic_pass
        tags:
          - test-basic
    keyauth_credentials:
      - key: test-api-key
        tags:
          - test-key
    jwt_secrets:
      - key: test-jwt-key
        secret: test-jwt-secret
        algorithm: HS256
        tags:
          - test-jwt

consumer_groups:
  - id: 5bcbd3a7-030b-4310-bd1d-2721ff85d236
    name: silver

key_sets:
  - id: a1b2c3d4-5678-90ab-cdef-1234567890ab
    name: test-key-set
    tags:
      - test-keyset

keys:
  - id: b2c3d4e5-6789-01bc-def1-234567890abc
    name: test-key-jwk
    kid: test-kid-123
    jwk: '{"kty":"RSA","kid":"test-kid-123","use":"sig","alg":"RS256","n":"xGOr-H7A-PWG8_gM6F_kE3vN1RVwfFjLJZQXYRqLXe7bAzRUH3n7HWpCCBU3_xHJpC1lSYHPLvLvQwGh_V5JjqXuQ_3FqLrRYmQYPZRCCQXKF9b2cHvY5LqJfVY3OhOYLvMnLJ_MQ7cKcW7N8HhKLYmQVY3_HqLrRYmQYPZRCQ","e":"AQAB"}'
    tags:
      - test-key
    set:
      id: a1b2c3d4-5678-90ab-cdef-1234567890ab

