_format_version: "3.0"
services:
  - name: test-service
    id: b35b3ec2-fa1c-4f6c-825e-c38141562c76
    host: ${{ env "DECK_SERVICE_HOST" }}
    port: 8080
    protocol: http
    read_timeout: 60000
    write_timeout: 60000
    retries: ${{ env "DECK_RETRIES" }}
    routes:
      - name: test-route
        id: a1234567-89ab-cdef-0123-456789abcdef
        paths:
          - /api
        regex_priority: ${{ env "DECK_REGEX_PRIORITY" }}
plugins:
  - name: rate-limiting
    id: c2222222-2222-2222-2222-222222222222
    config:
      minute: ${{ env "DECK_RATE_LIMIT" }}
      redis_database: ${{ env "DECK_REDIS_DB" }}

