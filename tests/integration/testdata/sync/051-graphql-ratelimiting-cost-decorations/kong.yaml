_format_version: "3.0"
plugins:
  - config:
      graphql_server_path: /graphql
    enabled: true
    name: degraphql
    protocols:
      - grpc
      - grpcs
      - http
      - https
services:
  - connect_timeout: 60000
    host: mockbin.org
    name: svc1
    port: 80
    protocol: http
    read_timeout: 60000
    retries: 5
    write_timeout: 60000
custom_entities:
  - type: graphql_ratelimiting_cost_decorations
    fields:
      service:
        name: svc1
      type_path: "Query.users"
      add_constant: 1.0
