_format_version: "3.0"
_info:
  select_tags:
    - "managed-by-test"
services:
- name: example-service
  port: 3200
  protocol: http
  host: localhost
  plugins:
    - config:
        limit_by: consumer
        minute: 6
        policy: local
      enabled: true
      name: rate-limiting
      protocols:
        - http
    - config:
        limit_by: consumer
        minute: 10
        policy: local
      consumer: bob # using name instead of UUID - should fail
      enabled: true
      name: rate-limiting
      protocols:
        - http
  routes:
  - name: example-route-1
    paths:
    - ~/r1

