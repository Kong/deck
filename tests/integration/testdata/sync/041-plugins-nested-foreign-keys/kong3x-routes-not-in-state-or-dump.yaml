_format_version: "3.0"
services:
- name: example-service
  port: 3200
  protocol: http
  host: localhost
  plugins:
    - config:
        minute: 100
        policy: local
      enabled: true
      name: rate-limiting
      protocols:
        - http
    - config:
        minute: 200
        policy: local
      route: 8ca63651-4068-4baa-b2b9-08dc99c29666 # external-route's id
      enabled: true
      name: rate-limiting
      protocols:
        - http

