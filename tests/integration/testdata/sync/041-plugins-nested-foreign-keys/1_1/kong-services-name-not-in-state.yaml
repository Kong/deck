_format_version: "1.1"
_info:
  select_tags:
    - "managed-by-test"
services:
- name: example-service2
  port: 3200
  protocol: http
  host: localhost

routes:
- name: example-route-1
  paths:
  - /r1
  service:
    name: example-service2
  plugins:
    - config:
        minute: 100
        policy: local
      enabled: true
      name: rate-limiting
      protocols:
        - http
    - config:
        minute: 200
        policy: local
      service: external-service # using name instead of UUID - should fail
      enabled: true
      name: rate-limiting
      protocols:
        - http

