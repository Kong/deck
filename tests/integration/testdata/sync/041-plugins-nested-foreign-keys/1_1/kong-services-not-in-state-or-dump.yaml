_format_version: "1.1"
services:
- name: example-service
  port: 3200
  protocol: http
  host: localhost

routes:
- name: example-route-1
  paths:
  - /r1
  service:
    name: example-service
  plugins:
    - config:
        minute: 100
        policy: local
      enabled: true
      name: rate-limiting
      protocols:
        - http
    - config:
        minute: 200
        policy: local
      service: 8ca63651-4068-4baa-b2b9-08dc99c29666 # external-service's id
      enabled: true
      name: rate-limiting
      protocols:
        - http
