_format_version: "3.0"
_workspace: AIGW
_info:
  defaults: {}
  select_tags:
    - aigw-workspace-consumers

consumer_groups:
  - name: aigw-main-tier1
    plugins:
      - name: rate-limiting-advanced
        config:
          window_size:
            - 1
            - 60
          limit:
            - 20
            - 1000
          identifier: consumer
          sync_rate: -1
          namespace: rate-limiting-aigw-main-tier1
          strategy: local
          hide_client_headers: false
          retry_after_jitter_max: 0

consumers:
  - username: prism-ai-core-tester
    acls:
      - group: AIGW/prism-ai-core-tester/owner-team
    groups:
      - name: aigw-main-tier1
