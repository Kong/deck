name: Validate Kong Gateway Release
concurrency:
  group: ${{ github.workflow }}
on:
  workflow_dispatch:
    inputs:
      kong_image:
        description: 'Kong Gateway Docker Image'
        required: true
        default: 'kong/kong-gateway-dev:latest'
      branch:
        description: 'decK Branch'
        required: true
        default: 'main'
jobs:
  integration:
    timeout-minutes: ${{ fromJSON(vars.DECK_WORKFLOW_GW_TIMEOUT) }}
    name: "${{ inputs.kong_image }} against ${{ inputs.branch }}"
    env:
      KONG_ANONYMOUS_REPORTS: "off"
      KONG_IMAGE: ${{ inputs.kong_image }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - name: Execution Information
        env:
          KONG_IMAGE_INPUT: ${{ inputs.kong_image }}
          BRANCH_INPUT: ${{ inputs.branch }}
        run: |
          echo "Kong Gateway Image = $KONG_IMAGE_INPUT"
          echo "decK Branch = $BRANCH_INPUT"
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: Kong/kong-license@master
        id: license
        with:
          op-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - name: Setup Kong
        env:
          KONG_LICENSE_DATA: ${{ steps.license.outputs.license }}
        run: make setup-kong-ee
      - name: Run integration tests
        env:
          KONG_LICENSE_DATA: ${{ steps.license.outputs.license }}
        run: make test-integration
