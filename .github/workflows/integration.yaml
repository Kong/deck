name: Integration Test

concurrency:
  # Run only for most recent commit in PRs but for all tags and commits on main
  # Ref: https://docs.github.com/en/actions/using-jobs/using-concurrency
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
    - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  integration:
    # Skip if the PR has the 'skip-oss' label
    if: ${{ github.event_name == 'push' || !contains(github.event.pull_request.labels.*.name, 'skip-oss') }}
    timeout-minutes: ${{ fromJSON(vars.DECK_WORKFLOW_GW_TIMEOUT || '10') }}
    strategy:
      matrix:
        kong_image:
        - 'kong:2.8'
        - 'kong:3.4'
        - 'kong:3.5'
        - 'kong:3.6'
        - 'kong:3.7'
        - 'kong:3.8'
        - 'kong:3.9'
        - 'kong/kong:master'
    env:
      KONG_ANONYMOUS_REPORTS: "off"
      KONG_IMAGE: ${{ matrix.kong_image }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Setup Kong
        run: make setup-kong
      - name: Run integration tests
        run: make test-integration
        continue-on-error: ${{ matrix.kong_image == 'kong/kong:master' }}
