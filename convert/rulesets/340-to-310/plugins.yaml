rules:
  # plugins rules
  session-plugin-check:
    description: >-
      New configuration field
    given:
      - $.plugins[?(@.name == 'session')].config
      - $.services[*].plugins[?(@.name == 'session')].config
      - $.routes[*].plugins[?(@.name == 'session')].config
      - $.services[*].routes[*].plugins[?(@.name == 'session')].config
      - $.consumers[*].plugins[?(@.name == 'session')].config
    message: >-
      Kong Gateway 3.5.x introduced the new configuration field read_body_for_logout with a
      default value of false. This change alters the behavior of logout_post_arg in such a way
      that it is no longer considered, unless read_body_for_logout is explicitly set to true.
      This adjustment prevents the Session plugin from automatically reading request bodies for
      logout detection, particularly on POST requests.
    severity: warn
    then:
      - field: read_body_for_logout
        function: defined
  azure-functions-plugin-check:
    description: >-
      New configuration field
    given:
      - $.plugins[?(@.name == 'azure-functions')].config
      - $.services[*].plugins[?(@.name == 'azure-functions')].config
      - $.routes[*].plugins[?(@.name == 'azure-functions')].config
      - $.services[*].routes[*].plugins[?(@.name == 'azure-functions')].config
      - $.consumers[*].plugins[?(@.name == 'azure-functions')].config
    message: >-
      The Azure Functions plugin now eliminates the upstream/request URI and only uses the routeprefix
      configuration field to construct the request path when requesting the Azure API.
    severity: warn
    then:
      - field: routeprefix
        function: defined
  redis-cluster-config-plugin-check:
    description: >-
      Redis schema field cluster_addresses had changed to cluster_nodes, sentinel_addresses had changed to sentinel_nodes
    given:
      - $.plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.services[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.services[*].routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.consumers[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
    message: >-
      Redis schema field cluster_addresses had changed to cluster_nodes, sentinel_addresses had changed to sentinel_nodes
    severity: error
    then:
      - field: cluster_addresses
        function: undefined
      - field: sentinel_addresses
        function: undefined
  redis-timeout-config-plugin-check:
    description: >-
      Redis schema field timeout is deprecated, use connect_timeout, send_timeout and read_timeout instead.
    given:
      - $.plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.services[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.services[*].routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
      - $.consumers[*].plugins[?(@.name == 'ai-rate-limiting-advanced' || @.name == 'graphql-proxy-cache-advanced' || @.name == 'graphql-rate-limiting-advanced' || @.name == 'proxy-cache-advanced' || @.name == 'rate-limiting-advanced')].config.redis
    message: >-
      Redis schema field timeout is deprecated, use connect_timeout, send_timeout and read_timeout instead.
    severity: warn
    then:
      - field: timeout
        function: falsy
  ai-rate-limiting-advanced-plugin-check-2:
    description: >-
      The plugin's config.llm_providers.window_size and config.llm_providers.limit parameters now
      require an array of numbers instead of a single number.
    given:
      - $.plugins[?(@.name == 'ai-rate-limiting-advanced')].config.llm_providers[*]
      - $.services[*].plugins[?(@.name == 'ai-rate-limiting-advanced')].config.llm_providers[*]
      - $.routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced')].config.llm_providers[*]
      - $.services[*].routes[*].plugins[?(@.name == 'ai-rate-limiting-advanced')].config.llm_providers[*]
      - $.consumers[*].plugins[?(@.name == 'ai-rate-limiting-advanced')].config.llm_providers[*]
    message: >-
      The plugin's config.llm_providers.window_size and config.llm_providers.limit parameters now
      require an array of numbers instead of a single number.
    severity: error
    then:
      - field: window_size
        function: schema
        functionOptions:
          schema:
            type: array
      - field: limit
        function: schema
        functionOptions:
          schema:
            type: array
  ai-plugins-check:
    description: >-
      Model schema field options.upstream_path is deprecated, use options.upstream_url instead.
    given:
      - $.plugins[?(@.name == 'ai-proxy' || @.name == 'ai-proxy-advanced' || @.name == 'ai-rag-injector' || @.name == 'ai-request-transformer' || @.name == 'ai-response-transformer' || @.name == 'ai-semantic-cache' || @.name == 'ai-semantic-prompt-guard')].config.model.options
      - $.services[*].plugins[?(@.name == 'ai-proxy' || @.name == 'ai-proxy-advanced' || @.name == 'ai-rag-injector' || @.name == 'ai-request-transformer' || @.name == 'ai-response-transformer' || @.name == 'ai-semantic-cache' || @.name == 'ai-semantic-prompt-guard')].config.model.options
      - $.routes[*].plugins[?(@.name == 'ai-proxy' || @.name == 'ai-proxy-advanced' || @.name == 'ai-rag-injector' || @.name == 'ai-request-transformer' || @.name == 'ai-response-transformer' || @.name == 'ai-semantic-cache' || @.name == 'ai-semantic-prompt-guard')].config.model.options
      - $.services[*].routes[*].plugins[?(@.name == 'ai-proxy' || @.name == 'ai-proxy-advanced' || @.name == 'ai-rag-injector' || @.name == 'ai-request-transformer' || @.name == 'ai-response-transformer' || @.name == 'ai-semantic-cache' || @.name == 'ai-semantic-prompt-guard')].config.model.options
      - $.consumers[*].plugins[?(@.name == 'ai-proxy' || @.name == 'ai-proxy-advanced' || @.name == 'ai-rag-injector' || @.name == 'ai-request-transformer' || @.name == 'ai-response-transformer' || @.name == 'ai-semantic-cache' || @.name == 'ai-semantic-prompt-guard')].config.model.options
    message: >-
      Model schema field options.upstream_path is deprecated, use options.upstream_url instead.
    severity: error
    then:
      - field: upstream_path
        function: undefined
